version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fpo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fpo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fpo_password}
      POSTGRES_DB: ${POSTGRES_DB:-fpo_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    container_name: fpo_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev

  web:
    build: ./apps/web
    container_name: fpo_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev

volumes:
  postgres_data: